name: Refresh Passion Broadcast

on:
  schedule:
    # Hourly checks during the remaining submission window, then one final
    # capture after the July 13, 2026 06:59 UTC deadline.
    - cron: "17 5-6 13 7 *"
    - cron: "10 7 13 7 *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: passion-broadcast-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
      SNOWFLAKE_PRIVATE_KEY_B64: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
    steps:
      - name: Validate challenge schedule
        id: window
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" && "$(date -u +%Y)" != "2026" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "This scheduled refresh is limited to the 2026 challenge window."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out the challenge project
        if: steps.window.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.window.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.window.outputs.run == 'true'
        run: npm ci

      - name: Refresh entries and broadcast
        if: steps.window.outputs.run == 'true'
        run: npm run ingest
